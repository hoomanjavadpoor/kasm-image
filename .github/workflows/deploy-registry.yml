name: Deploy Registry to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'workspaces/**'
      - '.github/workflows/deploy-registry.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build and deploy registry
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Clone Kasm registry template (schema 1.1)
        run: |
          git clone --depth=1 --branch=1.1 \
            https://github.com/kasmtech/workspaces_registry_template.git \
            /tmp/kasm-template

      - name: Copy workspace data into template
        run: |
          # Remove the default Chromium sample that ships with the template
          rm -rf /tmp/kasm-template/workspaces/chromium
          cp -r workspaces/. /tmp/kasm-template/workspaces/

      - name: Download workspace icons
        # Kasm builds icon URLs as {registry}/1.1/icons/{image_src}.
        # Absolute CDN URLs in image_src produce broken paths.
        # Download each icon locally and update image_src to the filename.
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request
          from pathlib import Path

          ws_root = Path('/tmp/kasm-template/workspaces')
          for ws_dir in sorted(ws_root.iterdir()):
              if not ws_dir.is_dir():
                  continue
              js_path = ws_dir / 'workspace.json'
              if not js_path.exists():
                  continue
              ws = json.loads(js_path.read_text())
              src = ws.get('image_src', '')
              if not src.startswith('http'):
                  continue  # already a local filename

              # Derive extension from content-type; fall back from URL
              ext = '.png'
              for e in ['.svg', '.webp', '.jpg', '.jpeg', '.png']:
                  if src.split('?')[0].lower().endswith(e):
                      ext = e
                      break
              try:
                  req = urllib.request.Request(src, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      ct = resp.headers.get('Content-Type', '')
                      if 'svg' in ct:   ext = '.svg'
                      elif 'webp' in ct: ext = '.webp'
                      elif 'jpeg' in ct or 'jpg' in ct: ext = '.jpg'
                      elif 'png' in ct:  ext = '.png'
                      icon_name = ws_dir.name + ext
                      (ws_dir / icon_name).write_bytes(resp.read())
                  ws['image_src'] = icon_name
                  js_path.write_text(json.dumps(ws, indent=2))
                  print(f'[OK] {ws_dir.name}: saved {icon_name}')
              except Exception as e:
                  print(f'[WARN] {ws_dir.name}: could not download icon ({e}), keeping URL')
          PYEOF

      - name: Configure registry (next.config.js)
        run: |
          cat > /tmp/kasm-template/site/next.config.js << 'NEXTEOF'
          /** @type {import('next').NextConfig} */
          const nextConfig = {
            output: 'export',
            distDir: '../site-output',
            env: {
              name: 'Kasm Custom Images',
              description: 'Custom Kasm Workspaces — Kubernetes IDEs, cloud CLIs, AI assistants, remote desktop, and more.',
              icon: 'https://github.com/hoomanjavadpoor.png?size=200',
              listUrl: 'https://hoomanjavadpoor.github.io/kasm-image/',
              contactUrl: 'https://github.com/hoomanjavadpoor/kasm-image/issues',
            },
            reactStrictMode: true,
            basePath: '/kasm-image/1.1',
            trailingSlash: true,
            images: {
              unoptimized: true,
            }
          }
          module.exports = nextConfig
          NEXTEOF

      - name: Patch template for external image URLs and correct default channel
        run: |
          # The template ships site/public/list.json (a static sample). Next.js
          # copies site/public/ into the build output, which would overwrite the
          # list.json generated by processjson.js. Remove it first.
          rm -f /tmp/kasm-template/site/public/list.json

          # Workspace.js prepends /icons/ to all image_src values.
          # Patch it to pass through absolute URLs (CDN logos) unchanged.
          sed -i \
            's|src={`${router.basePath}/icons/${workspace.image_src}`}|src={workspace.image_src.startsWith("http") ? workspace.image_src : `${router.basePath}/icons/${workspace.image_src}`}|' \
            /tmp/kasm-template/site/components/Workspace.js

          # processjson.js hardcodes default_channel='develop'; set to our tag.
          sed -i \
            "s/default_channel: 'develop'/default_channel: 'rolling-daily'/" \
            /tmp/kasm-template/processing/processjson.js

          # The glob "**\/workspace.json" searches the entire tree including
          # node_modules. Restrict it to the workspaces/ subdirectory only.
          sed -i \
            's|glob("\*\*/workspace.json"|glob("workspaces/**/workspace.json"|' \
            /tmp/kasm-template/processing/processjson.js

          # Belt-and-suspenders: remove any stray Chromium workspace.json files
          find /tmp/kasm-template/workspaces -name workspace.json \
            -exec grep -l '"Chromium"' {} \; 2>/dev/null | xargs -r rm -f

      - name: Process workspace JSON files
        # Must run BEFORE the Next.js build: the pages import list.json via
        # webpack at compile time. distDir is now site-output/ (separate from
        # public/) so the build no longer overwrites list.json.
        run: |
          cd /tmp/kasm-template
          npm ci --prefix processing
          node processing/processjson.js

      - name: Build Next.js site
        run: |
          cd /tmp/kasm-template
          npm ci --prefix site
          npm run build --prefix site

      - name: Assemble _site/ with correct path structure
        run: |
          # distDir=site-output (Next.js pages + assets)
          # public/         (list.json + icons from processjson.js)
          # Merge both under _site/1.1/ so basePath=/kasm-image/1.1 resolves.
          mkdir -p _site/1.1
          cp -r /tmp/kasm-template/site-output/. _site/1.1/
          cp -r /tmp/kasm-template/public/. _site/1.1/

          # Also serve list.json at the root so Kasm can find it regardless
          # of whether it appends 'list.json' or '1.1/list.json' to the URL.
          cp /tmp/kasm-template/public/list.json _site/list.json

          # versions.txt — Kasm fetches this first to discover available schema versions
          printf '1.0\n1.1\n' > _site/versions.txt

          # Root index.html — redirect visitors to the versioned path
          cat > _site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0; url=./1.1/" />
            <script>window.location.replace('./1.1/');</script>
            <title>Kasm Custom Images Registry</title>
          </head>
          <body>
            <a href="./1.1/">Redirecting to registry&hellip;</a>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
