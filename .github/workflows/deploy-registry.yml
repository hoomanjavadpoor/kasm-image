name: Deploy Registry to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'workspaces/**'
      - '.github/workflows/deploy-registry.yml'
  workflow_dispatch:

# Allow only one Pages deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build and deploy registry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone Kasm registry template (schema 1.1)
        run: |
          git clone --depth=1 --branch=1.1 \
            https://github.com/kasmtech/workspaces_registry_template.git \
            /tmp/kasm-template

      - name: Copy workspace data into template
        run: |
          cp -r workspaces/. /tmp/kasm-template/workspaces/

      - name: Configure registry (next.config.js)
        run: |
          cat > /tmp/kasm-template/site/next.config.js << 'NEXTEOF'
          /** @type {import('next').NextConfig} */
          const nextConfig = {
            output: 'export',
            distDir: '../public',
            env: {
              name: 'Kasm Custom Images',
              description: 'Custom Kasm Workspaces — Kubernetes IDEs, cloud CLIs, AI assistants, remote desktop, and more.',
              icon: 'https://github.com/hoomanjavadpoor.png?size=200',
              listUrl: 'https://hoomanjavadpoor.github.io/kasm-image/',
              contactUrl: 'https://github.com/hoomanjavadpoor/kasm-image/issues',
            },
            reactStrictMode: true,
            basePath: '/kasm-image/1.1',
            trailingSlash: true,
            images: {
              unoptimized: true,
            }
          }
          module.exports = nextConfig
          NEXTEOF

      - name: Patch template for external image URLs and correct default channel
        run: |
          # Workspace.js always prepends /icons/ — patch to pass through absolute URLs directly
          sed -i \
            's|src={`${router.basePath}/icons/${workspace.image_src}`}|src={workspace.image_src.startsWith("http") ? workspace.image_src : `${router.basePath}/icons/${workspace.image_src}`}|' \
            /tmp/kasm-template/site/components/Workspace.js

          # processjson.js hardcodes default_channel='develop'; change to our tag
          sed -i \
            "s/default_channel: 'develop'/default_channel: 'rolling-daily'/" \
            /tmp/kasm-template/processing/processjson.js

      - name: Process workspace JSON → list.json
        run: |
          cd /tmp/kasm-template
          npm ci --prefix processing
          node processing/processjson.js

      - name: Build Next.js site
        run: |
          cd /tmp/kasm-template
          npm ci --prefix site
          npm run build --prefix site

      - name: Copy build output into workspace
        run: |
          mkdir -p _site
          cp -r /tmp/kasm-template/public/. _site/

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          clean: true
