name: Deploy Registry to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'registry/**'
      - '.github/workflows/deploy-registry.yml'
  workflow_dispatch:

# Only one Pages deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build and deploy registry
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build registry site
        run: |
          mkdir -p _site/1.1
          cp registry/1.1/workspaces.json _site/1.1/workspaces.json
          echo "Workspaces in registry:"
          jq -r '.[] | "  - \(.friendly_name)  \(.compatibility[0].image)"' _site/1.1/workspaces.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
